spring:
  main:
    banner-mode: off
    web-application-type: none
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
      embedding:
        options:
          model: text-embedding-3-small

  temporal:
    connection:
      target: localhost:7233
    workers:
      - task-queue: rag-example-queue
        workflow-classes:
          - io.temporal.samples.springai.rag.RagWorkflowImpl

logging:
  level:
    io.temporal.springai: DEBUG
